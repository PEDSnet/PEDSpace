<!-- First, we'll create the full-width header outside the container -->
<div class="full-width-header-wrapper" *ngVar="(communityRD$ | async) as communityRD">
  <div class="full-width-header" *ngIf="communityRD?.hasSucceeded && communityRD?.payload">
    <div class="container">
      <!-- Only the page title goes here -->
      <ds-comcol-page-header [name]="dsoNameService.getName(communityRD?.payload)" class="midnight-header"></ds-comcol-page-header>
      <div class="header-share-row" *ngIf="communityRD?.payload?.handle">
        <ds-comcol-page-handle [content]="communityRD?.payload?.handle" [title]="''">
        </ds-comcol-page-handle>
      </div>
    </div>
  </div>
</div>

<!-- Then continue with your original container structure but without the header -->
<div class="container" *ngVar="(communityRD$ | async) as communityRD">
  <div class="community-page" *ngIf="communityRD?.hasSucceeded" @fadeInOut>
    <div *ngIf="communityRD?.payload; let communityPayload">
      <div class="d-flex flex-row border-bottom mb-4 pb-4">
        <header class="comcol-header mr-auto">
          <!-- Community logo -->
          <ds-comcol-page-logo *ngIf="logoRD$" [logo]="(logoRD$ | async)?.payload"
            [alternateText]="'community.logo' | translate">
          </ds-comcol-page-logo>
          <!-- Introductory text -->
          <ds-comcol-page-content [content]="communityPayload.introductoryText" [hasInnerHtml]="true">
          </ds-comcol-page-content>
          <!-- News -->
          <ds-comcol-page-content [content]="communityPayload.sidebarText" [hasInnerHtml]="true"
            [title]="'community.page.news'">
          </ds-comcol-page-content>
        </header>
        <div class="comcol-header-actions d-flex flex-column align-items-end">
          <ds-dso-edit-menu></ds-dso-edit-menu>
        </div>
      </div>
      <section class="comcol-page-browse-section">
        <!-- Browse-By bar removed per #176 -->
        <router-outlet></router-outlet>
      </section>
      <footer *ngIf="communityPayload.copyrightText" class="border-top my-5 pt-4">
        <!-- Copyright -->
        <ds-comcol-page-content [content]="communityPayload.copyrightText" [hasInnerHtml]="true">
        </ds-comcol-page-content>
      </footer>
    </div>
  </div>
  <ds-error *ngIf="communityRD?.hasFailed" message="{{'error.community' | translate}}"></ds-error>
  <ds-loading *ngIf="communityRD?.isLoading" message="{{'loading.community' | translate}}"></ds-loading>
</div>
