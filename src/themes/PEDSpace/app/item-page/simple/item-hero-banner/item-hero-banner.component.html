<div class="pedspace-item-hero-wrapper">
  <div class="pedspace-item-hero">
    <div class="container">
      <a class="pedspace-item-hero-badge"
         [routerLink]="['/search']"
         [queryParams]="badgeQueryParams">
        <span class="badge-text">{{ entityType }}</span>
      </a>

      <div class="d-flex flex-row align-items-start pedspace-item-hero-title-row">
        <ds-item-page-title-field class="mr-auto pedspace-item-hero-title" [item]="item">
        </ds-item-page-title-field>
        <ds-dso-edit-menu *ngIf="showEditMenu" [object]="item"></ds-dso-edit-menu>
      </div>

      
      <div class="d-flex align-items-center mt-2" *ngIf="shareUrl">
        <!-- Share button-->
        <div class="pedspace-item-hero-share">
          <button type="button"
            class="btn btn-sm pedspace-share-btn"
            [class.is-doi]="isDoiShare"
            (click)="copyShareUrl()">
            <i class="fas" [ngClass]="copied() ? 'fa-check' : (isDoiShare ? 'fa-external-link-alt' : 'fa-link')"></i>
            {{ copied() ? 'Copied!' : shareButtonLabel }}
          </button>
        </div>
        
        <!-- Cite button -->  
        <div class="pedspace-item-hero-cite ml-2">
          <button type="button" class="btn btn-sm pedspace-cite-btn" 
                (click)="copyCitation()"
                [class.copied]="citeCopied()"
                [title]="citeCopied() ? 'Citation copied!' : 'Copy citation'"
                [attr.aria-label]="citeCopied() ? 'Citation copied!' : 'Copy citation'">
            <i class="fa" [ngClass]="citeCopied() ? 'fa-check' : 'fa-copy'"></i>
            <span class="btn-label">{{ citeCopied() ? 'Copied!' : 'Cite' }}</span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
