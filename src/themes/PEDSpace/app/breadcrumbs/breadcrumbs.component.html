<ng-container *ngVar="(breadcrumbs$ | async) as breadcrumbs">
	<nav *ngIf="(showBreadcrumbs$ | async)" aria-label="breadcrumb" class="nav-breadcrumb">
		<ol class="breadcrumb my-0">
			<li class="breadcrumb-item">
				<div class="breadcrumb-item-limiter">
					<a href="https://pedsnet.org/" class="text-truncate" role="link" tabindex="0">Home</a>
				</div>
			</li>
			<li class="breadcrumb-item">
				<div class="breadcrumb-item-limiter">
					<a href="https://pedsnet.org/database/" class="text-truncate" role="link" tabindex="0">Database</a>
				</div>
			</li>
			<li class="breadcrumb-item active" aria-current="page">
				<div class="breadcrumb-item-limiter">
					<div class="text-truncate">PEDSpace Knowledge Bank</div>
				</div>
			</li>

			<ng-container *ngFor="let bc of breadcrumbs; let last = last;">
				<ng-container *ngTemplateOutlet="!last ? breadcrumb : activeBreadcrumb; context: bc"></ng-container>
			</ng-container>
		</ol>
	</nav>

	<ng-template #breadcrumb let-text="text" let-url="url">
		<li class="breadcrumb-item">
			<div class="breadcrumb-item-limiter">
				<a [routerLink]="url" class="text-truncate" [ngbTooltip]="text | translate" placement="bottom" role="link" tabindex="0">{{text | translate}}</a>
			</div>
		</li>
	</ng-template>

	<ng-template #activeBreadcrumb let-text="text">
		<li class="breadcrumb-item active" aria-current="page">
			<div class="breadcrumb-item-limiter">
				<div class="text-truncate">{{text | translate}}</div>
			</div>
		</li>
	</ng-template>
</ng-container>
