<div title="Search PEDSpace" (dsClickOutside)="collapse()">
	<div class="d-inline-block position-relative">
		<form [formGroup]="searchForm" (ngSubmit)="onSubmit(searchForm.value)" autocomplete="on" class="d-flex">
			<input #searchInput [@toggleAnimation]="isExpanded" aria-label="Search PEDSpace" name="query"
						 formControlName="query" type="text" placeholder="{{searchExpanded ? 'Search PEDSpace' : ''}}"
						 class="bg-transparent position-absolute form-control dropdown-menu-right pl-1 pr-4"
						 [class.display]="searchExpanded ? 'inline-block' : 'none'"
						 [tabIndex]="searchExpanded ? 0 : -1"
						 [attr.data-test]="'header-search-box' | dsBrowserOnly">
			<button class="submit-icon btn btn-link btn-link-inline" aria-label="Search PEDSpace" type="button" (click)="searchExpanded ? onSubmit(searchForm.value) : expand()" [attr.data-test]="'header-search-icon' | dsBrowserOnly" role="button" tabindex="0">
				<em class="fas fa-search fa-lg fa-fw"></em>
			</button>
		</form>
	</div>
</div>
